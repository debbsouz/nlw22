<!doctype html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipMaker | AI Viral Moments</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://upload-widget.cloudinary.com/latest/global/all.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#020617;
}

body{
font-family:"Inter",sans-serif;
background-color:var(--bg);
color:#f8fafc;
-webkit-font-smoothing:antialiased;
}

.glass{
background:rgba(15,23,42,0.6);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.08);
}

.video-glow{
box-shadow:0 0 80px -20px rgba(59,130,246,0.15);
}

.upload-btn{
transition:all 0.3s ease;
}

.upload-btn:hover{
transform:translateY(-2px);
}

</style>
</head>

<body class="overflow-x-hidden">

<main class="relative min-h-screen flex flex-col items-center">

<header class="absolute top-0 w-full py-10 flex justify-center">

<div class="flex items-center space-x-2">

<div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">

<i data-lucide="zap" class="w-5 h-5 text-white"></i>

</div>

<span class="text-xl font-bold tracking-tighter">ClipMaker</span>

</div>

</header>

<div class="w-full max-w-4xl flex flex-col items-center text-center mt-40 px-10">

<div class="flex flex-col items-center space-y-6 mb-16">

<div class="w-full max-w-md flex items-center bg-slate-900 rounded-xl border border-slate-800 p-1">

<div class="pl-4 pr-2">
<i data-lucide="key" class="w-5 h-5 text-slate-400"></i>
</div>

<input
id="api-key"
type="password"
class="w-full bg-transparent text-slate-200 px-2 py-4 focus:outline-none"
placeholder="Cole sua Gemini API Key..."
>

</div>

<button
id="upload-widget"
class="upload-btn flex items-center space-x-3 px-10 py-5 bg-blue-600 rounded-2xl font-bold text-lg"
>

<i data-lucide="upload" class="w-6 h-6"></i>
<span>Começar Upload</span>

</button>

<div id="loading" class="hidden flex items-center space-x-3 text-slate-400">

<div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
<span id="loading-text">Processando vídeo...</span>

</div>

</div>

<div class="w-full">

<div class="glass video-glow rounded-[32px] p-2 aspect-video relative overflow-hidden">

<div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600">

<i data-lucide="play-circle" class="w-16 h-16 mb-4 opacity-20"></i>

<p class="text-sm uppercase tracking-[0.2em]">
Ready for Canvas
</p>

</div>

<video
id="video"
class="hidden w-full h-full object-cover rounded-[24px]"
controls
></video>

</div>

</div>

</div>

</main>

<script>

lucide.createIcons()

const el={
loading:document.getElementById("loading"),
loadingText:document.getElementById("loading-text"),
video:document.getElementById("video"),
placeholder:document.getElementById("placeholder"),
apiKey:document.getElementById("api-key"),
uploadButton:document.getElementById("upload-widget")
}

const app={

cloudName:"dhgdmbhtj",
uploadPreset:"upload_video",
transcriptionURL:"",
public_id:"",

waitForTranscription:async()=>{

const maxAttempts=30

for(let i=0;i<maxAttempts;i++){

const url=`https://res.cloudinary.com/${app.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`

try{

const response=await fetch(url)

if(response.ok){
app.transcriptionURL=url
return true
}

}catch(e){}

await new Promise(r=>setTimeout(r,2000))

}

return false

},

getTranscription:async()=>{

const response=await fetch(app.transcriptionURL)
return response.text()

},

getViralMoment:async()=>{

const transcription=await app.getTranscription()

const apiKey=el.apiKey.value

const endpoint=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`

const prompt=`Find the most viral 30-60 second moment in this transcript and return only format so_10,eo_50.

${transcription}`

const response=await fetch(endpoint,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:prompt}
]
}
]
})
})

const data=await response.json()

return data.candidates[0].content.parts[0].text

}

}

const widget=cloudinary.createUploadWidget(
{
cloudName:app.cloudName,
uploadPreset:app.uploadPreset
},

async(error,result)=>{

if(!error && result && result.event==="success"){

app.public_id=result.info.public_id

el.loading.classList.remove("hidden")

const ready=await app.waitForTranscription()

if(!ready){
alert("Transcrição demorou demais")
return
}

const viral=await app.getViralMoment()

const videoURL=`https://res.cloudinary.com/${app.cloudName}/video/upload/${viral}/${app.public_id}.mp4`

el.video.src=videoURL
el.video.classList.remove("hidden")
el.placeholder.style.display="none"

el.loading.classList.add("hidden")

}

}
)

el.uploadButton.addEventListener("click",()=>{

if(!el.apiKey.value){

alert("Insira sua Gemini API Key primeiro")
return

}

widget.open()

})

</script>

</body>
</html>
